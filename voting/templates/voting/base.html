<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}School Election{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f, #2c5282);
            min-height: 100vh;
            color: #1a1a1a;
        }
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 24px;
        }
        h1, h2, h3 {
            margin-top: 0;
            color: #1e3a5f;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            margin-bottom: 24px;
        }
        .top-bar a {
            color: #ffd166;
            text-decoration: none;
            font-weight: 600;
            margin-left: 16px;
        }
        .top-bar a:hover { text-decoration: underline; }

        .message-success {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .message-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            margin-top: 6px;
        }
        label { font-weight: 600; display: block; margin-top: 14px; }

        button, .btn {
            background: #ffd166;
            color: #1e3a5f;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover, .btn:hover { background: #ffc233; }

        .candidate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .candidate-card {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }
        .candidate-card:hover {
            border-color: #ffd166;
            transform: translateY(-3px);
        }
        .candidate-card input[type="radio"] {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 18px;
            height: 18px;
        }
        .candidate-photo {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 10px;
            background: #f0f0f0;
        }
        .photo-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #94a3b8;
        }
        .candidate-name { font-weight: 700; color: #1e3a5f; }

        .locked-notice {
            background: #f1f5f9;
            color: #64748b;
            padding: 14px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .results-bar-bg {
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
            height: 22px;
            margin: 6px 0 4px;
        }
        .results-bar-fill {
            background: linear-gradient(90deg, #2c5282, #4299e1);
            height: 100%;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            padding-left: 8px;
            white-space: nowrap;
        }
        .result-row { margin-bottom: 14px; }
        .result-name { display: flex; justify-content: space-between; font-weight: 600; }

        .candidates-columns {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    flex-wrap: wrap;
}
.candidate-column {
    flex: 1;
    min-width: 260px;
}
.column-title {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #94a3b8;
    font-weight: 700;
    margin-bottom: 12px;
}
.candidate-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.candidate-card-v {
    display: flex;
    align-items: center;
    gap: 16px;
    border: 2px solid #eee;
    border-radius: 14px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s ease;
}
.candidate-card-v:hover {
    border-color: #ffd166;
    background: #fffdf5;
}
.candidate-card-v.checked-highlight {
    border-color: #4299e1;
    background: #ebf8ff;
}
.candidate-card-v input[type="checkbox"] {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    order: 3;
    margin-left: auto;
}
.avatar-circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 20px;
    color: #fff;
    object-fit: cover;
}
.avatar-boy { background: linear-gradient(135deg, #4299e1, #2c5282); }
.avatar-girl { background: linear-gradient(135deg, #ed64a6, #b83280); }
.candidate-info { display: flex; flex-direction: column; }
.candidate-card-v .candidate-name { font-size: 16px; }
.candidate-role { font-size: 12px; color: #94a3b8; }
        /* Mobile responsiveness */
@media (max-width: 600px) {
    .wrapper {
        padding: 16px 12px;
    }
    .card {
        padding: 20px;
        border-radius: 12px;
    }
    .top-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }
    .top-bar > div:last-child {
        display: flex;
        gap: 12px;
    }
    h1 { font-size: 20px; }
    h2 { font-size: 18px; }
    h3 { font-size: 16px; }

    .candidates-columns {
        flex-direction: column;
        gap: 12px;
    }
    .candidate-column {
        min-width: 100%;
    }
    .candidate-card-v {
        padding: 10px 12px;
        gap: 10px;
    }
    .avatar-circle {
        width: 44px;
        height: 44px;
        font-size: 16px;
    }
    .candidate-name {
        font-size: 14px;
    }
    .candidate-role {
        font-size: 11px;
    }
    button, .btn {
        width: 100%;
        padding: 14px;
    }
    input[type="text"], input[type="password"], input[type="email"] {
        font-size: 16px; /* prevents iOS auto-zoom on focus */
    }
    .candidate-photo, .photo-placeholder {
        max-width: 100%;
    }
    .results-bar-fill {
        font-size: 11px;
    }
}

/* Ensure images never overflow regardless of screen size */
img {
    max-width: 100%;
    height: auto;
}

    </style>
</head>
<body>
    <div class="wrapper">
        <div class="top-bar">
            <div>
    <strong style="font-size:20px;">⚖️ Strathmore University — School of Law</strong>
    <div style="font-size:13px; color:#cbd5e0; margin-top:2px;">Solicitor Class · Class Representative Election</div>
</div>
            <div>{% block topnav %}{% endblock %}</div>
        </div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
